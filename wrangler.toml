# Cloudflare Pages config.
#
# This repo deploys to a single Pages project (the existing `narenana` slot
# wired to narenana.com). The `site/_worker.js` file is auto-detected as a
# Pages Function and runs as a Worker for every request, doing routing, the
# /videos.json endpoint, and the hourly YouTube feed refresh cron.

name = "narenana"
compatibility_date = "2024-12-01"
pages_build_output_dir = "./site"

# Hourly RSS fetch — refreshes the YouTube feed cache in KV.
[triggers]
crons = ["0 * * * *"]

[vars]
# Channel mirrored at /videos.json. Public, no API key needed.
YOUTUBE_CHANNEL_ID = "UCaf-AGOmL7jLve1M1jibfRw"

# Where /log-viewer/* gets forwarded. The Pages deployment URL of the tool's
# own repo (narenana/edgetx-log-parser). Override per-environment in the CF
# dashboard if needed (e.g. point Preview at a staging deployment).
LOG_VIEWER_ORIGIN = "https://edgetx-log-parser.pages.dev"

# KV namespace for the parsed feed JSON.
# Create with:  npx wrangler kv namespace create VIDEOS_KV
# Then paste the returned id below.
[[kv_namespaces]]
binding = "VIDEOS_KV"
id = "e048dd7b7b0849bcba7b51557c4c6752"

# Cloudflare Worker (with static assets) config.
#
# Cloudflare's unified Workers create-from-Git flow deploys this repo as a
# Worker that serves static assets from `site/` and runs `src/index.js` as
# its entry point. The Worker handles routing (forwards /log-viewer/* to the
# tool's own deployment), serves /videos.json from KV, and runs an hourly
# cron that refreshes the YouTube feed cache. Static files fall through via
# env.ASSETS.fetch(request).
#
# Project name on Cloudflare: narenana-website. Bound to narenana.com.

name = "narenana-website"
main = "src/index.js"
compatibility_date = "2024-12-01"

[assets]
directory = "./site"
binding = "ASSETS"
# Run the Worker BEFORE the static-asset matcher. Without this, requests
# whose path maps to a file under site/ are served from Cloudflare's edge
# cache and the Worker is never invoked — meaning the apex→www redirect
# (and any future early-pipeline logic) is silently bypassed for the home
# page. With this flag, the Worker runs on every request and falls
# through to env.ASSETS.fetch() for paths it doesn't handle.
run_worker_first = true

# Two triggers, dispatched on event.cron inside scheduled():
#   hourly  → YouTube RSS cache refresh
#   */15    → catalog job slice (scan/verify, budget-sliced for the Free plan;
#             each invocation does one slice and persists a cursor in D1)
[triggers]
crons = ["0 * * * *", "*/15 * * * *"]

# The catalog database — ALL product data lives here, none in the repo.
# Created with: npx wrangler d1 create catalog --location=apac
[[d1_databases]]
binding = "CATALOG_DB"
database_name = "catalog"
database_id = "1737eb67-2904-49d1-bda2-2e0033b7b6c0"
migrations_dir = "catalog/migrations"

[vars]
# Channel mirrored at /videos.json. Public, no API key needed.
YOUTUBE_CHANNEL_ID = "UCaf-AGOmL7jLve1M1jibfRw"

# Where /log-viewer/* gets forwarded. The Pages/Workers deployment URL of
# the tool's own repo (narenana/edgetx-log-parser). Override per-environment
# in the CF dashboard if needed.
LOG_VIEWER_ORIGIN = "https://edgetx-log-parser.pages.dev"

# Staging origin used ONLY for the latest.narenana.com host — points at the
# `latest` Pages branch alias so latest.narenana.com/log-viewer/ mirrors the
# newest preview build while www / apex stay on production (LOG_VIEWER_ORIGIN).
# Deploy a new staging build with:
#   npm --prefix ../edgetx-log-parser run build
#   npx wrangler pages deploy ../edgetx-log-parser/dist \
#     --project-name=edgetx-log-parser --branch=latest
LOG_VIEWER_ORIGIN_LATEST = "https://latest.edgetx-log-parser.pages.dev"

# KV namespace for the parsed feed JSON.
# Created with:  npx wrangler kv namespace create VIDEOS_KV
[[kv_namespaces]]
binding = "VIDEOS_KV"
id = "e048dd7b7b0849bcba7b51557c4c6752"

# Workers AI — used by the catalog enrich job to classify listings (aircraft
# vs accessory) and clean model names. Optional: all code guards on env.AI, so
# removing this binding just degrades enrichment to pure heuristics.
[ai]
binding = "AI"

# Browser Rendering — a real headless Chrome for sellers whose WAFs 403 plain
# Worker fetches (rcdhamaka). Free-plan allocation ≈10 browser-min/day, so it
# is used ONLY for sources that opt in; all code guards on env.BROWSER.
[browser]
binding = "BROWSER"

# The catalog admin at /admin is gated by HTTP Basic auth (user `admin`). The
# password is NOT set here (secrets never live in the repo):
#   npx wrangler secret put ADMIN_PASS
# When unset, admin + API return 503 — the gate is closed by default.

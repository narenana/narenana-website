# Cloudflare Worker (with static assets) config.
#
# Cloudflare's unified Workers create-from-Git flow deploys this repo as a
# Worker that serves static assets from `site/` and runs `src/index.js` as
# its entry point. The Worker handles routing (forwards /log-viewer/* to the
# tool's own deployment), serves /videos.json from KV, and runs an hourly
# cron that refreshes the YouTube feed cache. Static files fall through via
# env.ASSETS.fetch(request).
#
# Project name on Cloudflare: narenana-website. Bound to narenana.com.

name = "narenana-website"
main = "src/index.js"
compatibility_date = "2024-12-01"

[assets]
directory = "./site"
binding = "ASSETS"

# Hourly RSS fetch — refreshes the YouTube feed cache in KV.
[triggers]
crons = ["0 * * * *"]

[vars]
# Channel mirrored at /videos.json. Public, no API key needed.
YOUTUBE_CHANNEL_ID = "UCaf-AGOmL7jLve1M1jibfRw"

# Where /log-viewer/* gets forwarded. The Pages/Workers deployment URL of
# the tool's own repo (narenana/edgetx-log-parser). Override per-environment
# in the CF dashboard if needed.
LOG_VIEWER_ORIGIN = "https://edgetx-log-parser.pages.dev"

# KV namespace for the parsed feed JSON.
# Created with:  npx wrangler kv namespace create VIDEOS_KV
[[kv_namespaces]]
binding = "VIDEOS_KV"
id = "e048dd7b7b0849bcba7b51557c4c6752"
